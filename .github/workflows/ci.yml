name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Least-privilege default token for the whole workflow.
# Jobs that need to write id-tokens / attestations raise their own scope locally.
permissions:
  contents: read

jobs:
  test:
    name: test + typecheck (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other legs when one fails — a macOS-only or
      # node-version-only regression must stay visible.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # "22.19.0" mirrors .nvmrc (the pinned floor — keep in sync if .nvmrc bumps);
        # "24" is the newest LTS line, proving forward-compat across a Node major.
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: doctor (every example harness must preflight clean)
        run: |
          for d in harnesses/*/; do
            if [ -f "${d}harness.json" ]; then
              echo "== doctor ${d} =="
              npm run chat --silent -- doctor "$d"
            fi
          done

  desktop-build:
    name: desktop compile (${{ matrix.os }})
    # Only compile the desktop shell once the JS/TS suite is green.
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Tauri's Linux target links against WebKitGTK + friends; these must exist
      # before `cargo build` touches the tauri crate. macOS ships the equivalent
      # frameworks in the SDK, so this step is Linux-only.
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          # A pinned commit SHA can't carry the channel the way `@stable` does,
          # so name the toolchain explicitly.
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - run: npm ci

      # Build the Vite UI first: tauri-build (src-tauri/build.rs) embeds the
      # frontendDist (apps/desktop/dist-ui) at compile time, so `cargo build`
      # fails if the bundle doesn't exist yet. Script matches tauri.conf.json's
      # beforeBuildCommand (`npm run build:ui`).
      - name: Build desktop UI (Vite -> dist-ui)
        run: npm --workspace @openharness/desktop run build:ui

      # High-signal per-PR check: compile the Rust shell in release mode WITHOUT
      # producing installers (bundling is heavy/flaky and needs signing config).
      - name: Compile Tauri Rust shell
        run: cargo build --release --manifest-path apps/desktop/src-tauri/Cargo.toml

      # Full installer build is reserved for main (release-shaped runs). Unsigned
      # bundles are fine here — this proves the packaging path end-to-end and
      # publishes the artifacts. Gated so per-PR runs never pay the bundling cost.
      - name: Build desktop installers (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm --workspace @openharness/desktop run build:desktop

      - name: Upload desktop installers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-bundle-${{ matrix.os }}
          path: apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: warn

  supply-chain:
    name: SBOM + build provenance
    needs: test
    runs-on: ubuntu-latest
    # Provenance/attestation needs to mint an OIDC token and write attestations;
    # everything else stays read-only.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci

      # CycloneDX SBOM via built-in npm tooling (npm 9+) — no third-party action
      # to pin, and it reflects the exact installed dependency tree.
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type application > sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error

      # SLSA build provenance over the SBOM. Guarded to `push` only: fork PRs
      # can't get an id-token, so attestation would hard-fail there.
      - name: Attest SBOM provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: sbom.cyclonedx.json
