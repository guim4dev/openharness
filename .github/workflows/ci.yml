name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: doctor (every example harness must preflight clean)
        run: |
          for d in harnesses/*/; do
            if [ -f "${d}harness.json" ]; then
              echo "== doctor ${d} =="
              npm run chat --silent -- doctor "$d"
            fi
          done
